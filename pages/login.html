<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Fintech Pro</title>
 <link rel="stylesheet" href="login.css">
 <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
 <div class="page">
  <div class="left">
   <img src="/assests/Login_bg.png" alt="">
   <div class="logo">
    <div class="icon">
     <img src="/assests/fin_logo.png" alt="">
    </div>
    <div class="logoname">
     <div class="lineup">FinTrack Pro</div>
     <div class="linedown">Enterprise Finance</div>
    </div>
   </div>
  </div>
  <div class="right">
   <img id="login" src="/assests/right_bg.webp" alt="">
   <img id="signup" src="/assests/right_signup_bg.webp" alt="">

   <div class="container">

    <div class="tabs">
     <div class="slider"></div>

     <button id="tablogin" class="tab active">Login</button>
     <button id="tabsignup" class="tab">Sign Up</button>
    </div>

    <form id="loginform">

     <label>Email Address</label>

     <div class="input-box">
      <input type="email" placeholder="Enter Email Address">
     </div>

     <label>Password</label>

     <div class="input-box">
      <input type="password" placeholder="Enter Password">
     </div>

     <button class="continue-btn">
      Login
     </button>

    </form>

    <form id="signupform">

     <label>Email Address</label>

     <div class="input-box">
      <input type="email" placeholder="Enter Email Address">
     </div>

     <label>Password</label>

     <div class="input-box">
      <input type="password" placeholder="Enter Password">
     </div>

     <button class="rg-btn" id="rg">
      Register
     </button>

    </form>


    <div class="divider">
     <span></span>
     <p>or</p>
     <span></span>
    </div>

    <div class="social">

     <button>
      <img src="https://www.svgrepo.com/show/475656/google-color.svg">
      Google
     </button>

     <button>
      <i class="ri-apple-fill"></i>
      Apple
     </button>


    </div>

   </div>
  </div>
 </div>

 <script src="loginsignup.js"></script>
</body>

</html>
